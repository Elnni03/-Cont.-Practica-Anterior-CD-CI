{% extends 'base.html' %}
{% block title %}Login — Gestor de Tareas{% endblock %}
{% block content %}
<div class="form-page">
  <h1>Iniciar Sesion</h1>
  <form method="POST" action="{{ url_for('login') }}" class="task-form" id="login-form">
    <div class="form-group">
      <label for="username">Usuario</label>
      <input type="text" id="username" name="username" placeholder="Ingresa tu usuario"/>
    </div>
    <div class="form-group">
      <label for="password">Contrasena</label>
      <input type="password" id="password" name="password" placeholder="Ingresa tu contrasena"/>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" id="btn-login">Iniciar Sesion</button>
    </div>
    <div style="margin-top:1rem; text-align:center; font-size:0.85rem; color:#718096;">
      Usuario: <b>admin</b> &nbsp;|&nbsp; Contrasena: <b>admin123</b>
    </div>
  </form>
</div>
{% endblock %}
